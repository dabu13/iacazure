name: 'Terraform Deploy to Azure'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write # Required for requesting the OIDC token
  contents: read  # Required for actions/checkout

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  scan:
    name: 'Checkov Security Scan'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Checkov Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        # This will fail the job if there are security violations.
        # You can set `soft_fail: true` to prevent it from failing.

  deploy:
    name: 'Deploy to Azure'
    runs-on: ubuntu-latest
    needs: scan
    # Only run the deploy job on the main branch pushes, not Pull Requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # This environment name creates the manual approval gate in GitHub
    environment:
      name: production
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan
